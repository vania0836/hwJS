<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Домашнє завдання</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<p id="hamlet-out"></p>
<p id="hamlet-author"></p>

<div class="countdown">
    <div class="cd-cell">
        <div class="cd-num" id="cd-days">--</div>
        <div class="cd-label">days</div>
    </div>
    <div class="cd-cell">
        <div class="cd-num" id="cd-hours">--</div>
        <div class="cd-label">hours</div>
    </div>
    <div class="cd-cell">
        <div class="cd-num" id="cd-min">--</div>
        <div class="cd-label">minutes</div>
    </div>
    <div class="cd-cell">
        <div class="cd-num" id="cd-sec">--</div>
        <div class="cd-label">seconds</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
